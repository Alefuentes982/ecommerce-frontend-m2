<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/assets//img/icon.png" type="image/png" />
    <title>Detalle de Producto</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
          <a class="navbar-brand" href="index.html">CAFÉ café</a>
          <div class="ms-auto">
            <a href="index.html" class="btn btn-outline-light me-2">Home</a>
            <a href="carrito.html" class="btn btn-primary position-relative">
              Carrito
              <span
                id="cart-count"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                >0</span
              >
            </a>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mt-5 pt-5">
      <article class="row mt-4 align-items-center">
        <div class="col-md-6 mb-4">
          <img
            id="det-img"
            src="https://via.placeholder.com/600x400"
            class="img-fluid rounded shadow"
            alt="Producto"
          />
        </div>
        <div class="col-md-6">
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="index.html">Tienda</a></li>
              <li class="breadcrumb-item active">Detalle</li>
            </ol>
          </nav>
          <h1 id="det-nombre" class="display-5 fw-bold">Cargando...</h1>
          <p id="det-precio" class="fs-4 text-success fw-bold"></p>
          <p id="det-desc" class="lead"></p>
          <hr />
          <div class="d-grid gap-2">
            <button id="btn-add-detail" class="btn btn-primary btn-lg">
              Agregar al Carrito
            </button>
            <a href="index.html" class="btn btn-link text-decoration-none"
              >Volver a la tienda</a
            >
          </div>
        </div>
      </article>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <small>&copy; 2026 AleFuentes. Todos los derechos reservados.</small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
