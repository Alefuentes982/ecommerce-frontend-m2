<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/assets//img/icon.png" type="image/png" />
    <title>Mi Carrito</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
          <a class="navbar-brand" href="index.html">CAFÉ café</a>
          <div class="ms-auto">
            <a href="index.html" class="btn btn-outline-light me-2"
              >Seguir Comprando</a
            >
          </div>
        </div>
      </nav>
    </header>

    <main class="container mt-5 pt-5">
      <section class="row">
        <div class="col-12">
          <h2 class="mb-4">Tu Carrito</h2>
          <div id="cart-container" class="list-group shadow-sm"></div>

          <div id="cart-empty" class="text-center py-5 d-none">
            <p class="lead">Tu carrito está vacío.</p>
            <a href="index.html" class="btn btn-primary">Ver productos</a>
          </div>

          <div id="cart-total" class="mt-4 text-end d-none">
            <h3 id="total-price">Total: $0</h3>
            <button class="btn btn-success btn-lg mt-2">
              Finalizar Compra
            </button>
            <button
              id="clear-cart"
              class="btn btn-outline-danger btn-lg mt-2 ms-2"
            >
              Vaciar Carrito
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <small>&copy; 2026 AleFuentes. Todos los derechos reservados.</small>
      </div>
    </footer>

    <script src="assets/js/cart.js"></script>
  </body>
</html>
